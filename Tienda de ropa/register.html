<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emprende Ropa - Registro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/Logo empresa.png" type="image/png">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="img/Logo empresa.png" alt="Emprende Ropa Logo" class="logo">
            <h1>Emprende Ropa</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#catalogo">Catálogo</a></li>
                <li><a href="cart.html">Carrito (<span id="cart-count">0</span>)</a></li>
                <li id="auth-link"><a href="login.html">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="auth-container">
            <h2>Crear Cuenta</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">Nombre Completo</label>
                    <input type="text" id="register-name" required placeholder="Tu Nombre">
                </div>
                <div class="form-group">
                    <label for="register-email">Correo Electrónico</label>
                    <input type="email" id="register-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="register-confirm-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Registrarse</button>
            </form>
            <div class="auth-link">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Emprende Ropa. Todos los derechos reservados.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
